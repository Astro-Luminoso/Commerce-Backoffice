spring.application.name=commerce_backoffice

# MySQL (env vars can override defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:daily_manager}
spring.datasource.username=${DB_USER:daily_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA defaults for local development
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.sql.init.mode=${SQL_INIT:always}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
server.servlet.context-path=/api/v1

encoder.strenth=${STRENGTH:10}

# jwt
jwt.secret=${JWT_SECRET}
jwt.expire-time=${JWT_EXPIRE_TIME}